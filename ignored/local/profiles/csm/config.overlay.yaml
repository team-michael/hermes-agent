agent:
  reasoning_effort: xhigh
  service_tier: fast
terminal:
  env_passthrough:
  - GITHUB_TOKEN
  - SLACK_BOT_TOKEN
display:
  interim_assistant_messages: false
  platforms:
    slack:
      streaming: false
      tool_progress: 'off'
  tool_progress: 'off'
approvals:
  mode: 'off'
session_reset:
  mode: none
platform_toolsets:
  cli:
  - browser
  - clarify
  - code_execution
  - cronjob
  - delegation
  - file
  - image_gen
  - memory
  - messaging
  - session_search
  - skills
  - terminal
  - todo
  - tts
  - vision
  - web
  slack:
  - browser
  - clarify
  - code_execution
  - cronjob
  - delegation
  - file
  - image_gen
  - memory
  - messaging
  - session_search
  - skills
  - terminal
  - todo
  - tts
  - vision
  - web
known_plugin_toolsets:
  cli:
  - spotify
  slack:
  - spotify
update:
  local_patch_branch: local/hermes-patches
skills:
  external_dirs:
  - /home/ubuntu/.hermes/hermes-agent/ignored/local/profiles/csm/skills
  - /home/ubuntu/.hermes/hermes-agent/ignored/local/skills
