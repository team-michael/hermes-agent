model:
  provider: openai
  base_url: ''
  default: gpt-5.5
providers:
  openai-codex:
    request_timeout_seconds: 900
    stale_timeout_seconds: 900
  openai:
    name: OpenAI
    base_url: https://api.openai.com/v1
    key_env: OPENAI_API_KEY
    default_model: gpt-5.5
    transport: codex_responses
fallback_providers:
- provider: openai
  model: gpt-5.5
  context_length: 1050000
compression:
  enabled: true
  threshold: 0.75
  target_ratio: 0.30
  protect_last_n: 20
  hygiene_hard_message_limit: 400
auxiliary:
  compression:
    provider: auto
    model: gpt-5.4-mini
    base_url: ""
    api_key: ""
    timeout: 240
    extra_body:
      service_tier: priority
      reasoning:
        effort: low
agent:
  gateway_notify_interval: 0
  reasoning_effort: xhigh
  service_tier: fast
terminal:
  env_passthrough:
  - GITHUB_TOKEN
  - SLACK_BOT_TOKEN
display:
  busy_input_mode: queue
  interim_assistant_messages: false
  platforms:
    slack:
      streaming: false
      tool_progress: 'off'
  tool_progress: 'off'
approvals:
  mode: 'off'
session_reset:
  mode: none
platform_toolsets:
  cli:
  - browser
  - clarify
  - code_execution
  - cronjob
  - delegation
  - file
  - image_gen
  - memory
  - messaging
  - session_search
  - skills
  - terminal
  - todo
  - tts
  - vision
  - web
  slack:
  - browser
  - clarify
  - code_execution
  - cronjob
  - delegation
  - file
  - image_gen
  - memory
  - messaging
  - session_search
  - skills
  - terminal
  - todo
  - tts
  - vision
  - web
update:
  local_patch_branch: main
skills:
  external_dirs:
  - /home/ubuntu/.hermes/hermes-agent/ignored/local/profiles/sdr/skills
  - /home/ubuntu/.hermes/hermes-agent/ignored/local/skills
slack:
  allow_bots: all
  message_subscriptions:
  - name: notifly-help-inbound-research
    channels:
    - C049CGKGG8L
    subtypes:
    - bot_message
    bot_names:
    - Notifly Help
    reactions: true
    final_reaction: processing_status
  channel_prompts:
    C049CGKGG8L: A Notifly Help inbound or prospect message was posted. Read the
      new message and thread context, search prior sdr sessions for matching company,
      domain, contact, and similar customer context, then research public evidence.
      Return a concise Korean SDR brief with qualification, key evidence, relevant
      prior context, recommended sales angle, next action, and uncertainty. This
      is not a monitoring alert; do not use the check skill by default.
  channel_skill_bindings:
  - id: C049CGKGG8L
    skills:
    - notifly-sdr-lead-research
    - notifly-sales-enablement
