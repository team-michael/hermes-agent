model:
  provider: openai
  base_url: ''
  default: gpt-5.4-mini
  context_length: 400000
providers:
  openai:
    name: OpenAI
    base_url: https://api.openai.com/v1
    key_env: OPENAI_API_KEY
    default_model: gpt-5.4-mini
    transport: codex_responses
agent:
  gateway_notify_interval: 0
  reasoning_effort: none
  service_tier: fast
terminal:
  env_passthrough:
  - GITHUB_TOKEN
  - SLACK_BOT_TOKEN
display:
  busy_input_mode: queue
  interim_assistant_messages: false
  platforms:
    slack:
      streaming: false
      tool_progress: 'off'
  tool_progress: 'off'
approvals:
  mode: 'off'
session_reset:
  mode: none
platform_toolsets:
  cli:
  - browser
  - clarify
  - code_execution
  - cronjob
  - delegation
  - file
  - image_gen
  - memory
  - messaging
  - session_search
  - skills
  - terminal
  - todo
  - tts
  - vision
  - web
  slack:
  - browser
  - clarify
  - code_execution
  - cronjob
  - delegation
  - file
  - image_gen
  - memory
  - messaging
  - session_search
  - skills
  - terminal
  - todo
  - tts
  - vision
  - web
update:
  local_patch_branch: main
skills:
  external_dirs:
  - /home/ubuntu/.hermes/hermes-agent/ignored/local/profiles/hashimoto/skills
  - /home/ubuntu/.hermes/hermes-agent/ignored/local/skills
slack:
  allow_bots: all
  free_response_channels: C04KT7EH5RQ,C07LCLRS79T
  message_subscriptions:
  - name: amazon-q-monitoring
    channels:
    - C04KT7EH5RQ
    - C07LCLRS79T
    subtypes:
    - bot_message
    bot_names:
    - Amazon Q
    - Amazon Q Developer
    reactions: true
    final_reaction: processing_status
  channel_prompts:
    C04KT7EH5RQ: Monitoring alert received. Use the check skill to investigate and
      return a concise Korean analysis.
    C07LCLRS79T: Monitoring alert received. Use the check skill to investigate and
      return a concise Korean analysis.
  channel_skill_bindings:
  - id: C04KT7EH5RQ
    skills:
    - check
  - id: C07LCLRS79T
    skills:
    - check
bedrock:
  region: us-east-1
