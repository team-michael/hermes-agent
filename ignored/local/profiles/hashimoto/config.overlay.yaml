model:
  default: '@cf/google/gemma-4-26b-a4b-it'
  context_length: 256000
  provider: workers-ai
providers:
  workers-ai:
    name: Cloudflare Workers AI
    api: https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}/ai/v1
    key_env: CLOUDFLARE_API_TOKEN
    default_model: '@cf/google/gemma-4-26b-a4b-it'
    models:
      '@cf/google/gemma-4-26b-a4b-it':
        context_length: 256000
      '@cf/moonshotai/kimi-k2.6':
        context_length: 262144
agent:
  gateway_notify_interval: 0
  reasoning_effort: high
  service_tier: fast
terminal:
  env_passthrough:
  - GITHUB_TOKEN
  - SLACK_BOT_TOKEN
display:
  busy_input_mode: queue
  interim_assistant_messages: false
  platforms:
    slack:
      streaming: false
      tool_progress: 'off'
  tool_progress: 'off'
approvals:
  mode: 'off'
session_reset:
  mode: none
platform_toolsets:
  cli:
  - browser
  - clarify
  - code_execution
  - cronjob
  - delegation
  - file
  - image_gen
  - memory
  - messaging
  - session_search
  - skills
  - terminal
  - todo
  - tts
  - vision
  - web
  slack:
  - browser
  - clarify
  - code_execution
  - cronjob
  - delegation
  - file
  - image_gen
  - memory
  - messaging
  - session_search
  - skills
  - terminal
  - todo
  - tts
  - vision
  - web
update:
  local_patch_branch: main
skills:
  external_dirs:
  - /home/ubuntu/.hermes/hermes-agent/ignored/local/profiles/hashimoto/skills
  - /home/ubuntu/.hermes/hermes-agent/ignored/local/skills
slack:
  allow_bots: all
  free_response_channels: C04KT7EH5RQ,C07LCLRS79T
  message_subscriptions:
  - name: amazon-q-monitoring
    channels:
    - C04KT7EH5RQ
    - C07LCLRS79T
    subtypes:
    - bot_message
    bot_names:
    - Amazon Q
    - Amazon Q Developer
    reactions: true
    final_reaction: processing_status
  channel_prompts:
    C04KT7EH5RQ: Monitoring alert received. Use the check skill to investigate and
      return a concise Korean analysis.
    C07LCLRS79T: Monitoring alert received. Use the check skill to investigate and
      return a concise Korean analysis.
  channel_skill_bindings:
  - id: C04KT7EH5RQ
    skills:
    - check
  - id: C07LCLRS79T
    skills:
    - check
